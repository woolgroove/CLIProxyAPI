# Built-in default config keys used to backfill missing fields on upgrade.
# Existing user values are never overwritten. Credential/provider lists are
# only added as empty collections when the key is entirely missing.

host: ""
port: 8317

tls:
  enable: false
  cert: ""
  key: ""

remote-management:
  allow-remote: false
  secret-key: ""
  disable-control-panel: false
  disable-auto-update-panel: false
  panel-github-repository: "https://github.com/josephcy95/Cli-Proxy-API-Management-Center"

auth-dir: "~/.cli-proxy-api"
api-keys: []

debug: false

pprof:
  enable: false
  addr: "127.0.0.1:8316"

plugins:
  enabled: false
  dir: "plugins"
  store-sources: []
  store-auth: []
  configs: {}

commercial-mode: false
logging-to-file: false
logs-max-total-size-mb: 0
error-logs-max-files: 10
usage-statistics-enabled: false
redis-usage-queue-retention-seconds: 60
proxy-url: ""
force-model-prefix: false
passthrough-headers: false
request-retry: 3
max-retry-credentials: 0
max-retry-interval: 30
disable-cooling: false
transient-error-cooldown-seconds: 0
disable-claude-cloak-mode: false
disable-image-generation: false

xai:
  auto-disable-permission-denied: true
  other-403-cooldown-hours: 6
  free-usage-exhausted-cooldown-hours: 24
  free-usage-exhausted-disable-after: 3
  other-403-disable-after: 3

gpt-image-2-base-model: "gpt-5.4-mini"
video-result-auth-cache-ttl: "3h"
auth-auto-refresh-workers: 0

quota-exceeded:
  switch-project: true
  switch-preview-model: true
  antigravity-credits: true

routing:
  strategy: "round-robin"
  session-affinity: false
  session-affinity-ttl: "1h"

codex:
  identity-confuse: false
  auto-disable-auth-failures: true
  auth-failure-disable-after: 1
  usage-limit-disable-after: 3
  usage-limit-cooldown-fallback-hours: 1
  instructions:
    enabled: false
    mode: "prepend"
    models: []
    oauth-only: true
    use-prefix-suffix: true
    require-auth-allow: true
    reserve-marked-auths: false
    request-markers:
      prefixes: []
      suffixes: []
    content: ""

ws-auth: true
nonstream-keepalive-interval: 0

streaming:
  keepalive-seconds: 0
  bootstrap-retries: 0

antigravity-signature-cache-enabled: true
antigravity-signature-bypass-strict: false

gemini-api-key: []
interactions-api-key: []
codex-api-key: []
claude-api-key: []
vertex-api-key: []
openai-compatibility: []

claude-header-defaults: {}
codex-header-defaults: {}
oauth-model-alias: {}
oauth-excluded-models: {}
payload: {}
