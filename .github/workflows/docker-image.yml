name: docker-image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Docker image tag to publish
        required: false
        default: latest
      platforms:
        description: Target platforms. Use linux/amd64 for the fastest build.
        required: false
        default: linux/amd64
  push:
    tags:
      - v*

permissions:
  contents: read
  packages: write

env:
  APP_NAME: CLIProxyAPI
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cli-proxy-api

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build metadata
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          platforms="${{ inputs.platforms }}"
          if [ -z "${tag}" ]; then
            tag="${GITHUB_REF_NAME}"
          fi
          if [ -z "${platforms}" ]; then
            platforms="linux/amd64"
          fi
          image_name="$(printf '%s' "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          commit="$(git rev-parse --short HEAD)"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "IMAGE_NAME=${image_name}" >> "${GITHUB_ENV}"
          echo "IMAGE_TAG=${tag}" >> "${GITHUB_ENV}"
          echo "PLATFORMS=${platforms}" >> "${GITHUB_ENV}"
          echo "VERSION=${tag}" >> "${GITHUB_ENV}"
          echo "COMMIT=${commit}" >> "${GITHUB_ENV}"
          echo "BUILD_DATE=${build_date}" >> "${GITHUB_ENV}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ env.COMMIT }}

      - name: Print image
        run: |
          echo "Published ${IMAGE_NAME}:${IMAGE_TAG}"
          echo "Published ${IMAGE_NAME}:${COMMIT}"
